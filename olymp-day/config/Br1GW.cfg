!================================================
! Br1GW — EVE-NG STARTUP-CONFIG (paste as-is)
!================================================
! Хэрхэн ашиглах:
!   1) EVE-NG web UI → Br1GW node-ыг STOP хийнэ
!   2) Right-click Br1GW → "Edit" → Startup-config tab
!   3) Доорх бүх текстийг хуулж paste → "Save"
!   4) Right-click Br1GW → "Start"
!   5) ~60-90 сек хүлээгээд console-руу нэвтэрч `show ip int brief`
!      → Gi0/1 DHCP-аас IP авч, Tunnel100 up болохыг шалгах
!================================================
! ASSUMPTIONS:
!   Gi0/0 = inside  (branch users — 10.1.8.0/24)
!   Gi0/1 = outside (ISP — DHCP)
!   PSK   = OlympLab2026  (GW-1 талд яг ижил утга)
!   ⚠ EVE topology link mapping өөр бол Gi0/0 ↔ Gi0/1-ийг солих
!================================================
!
version 15.9
service timestamps debug datetime msec
service timestamps log datetime msec
no service password-encryption
!
hostname Br1GW
!
boot-start-marker
boot-end-marker
!
enable secret 0 OlympLab2026
!
no aaa new-model
!
ip cef
!
ip domain name olympiad.local
no ip domain lookup
!
username admin privilege 15 secret 0 OlympLab2026
!
redundancy
!
crypto ikev2 keyring KR_HQ
 peer GW1
  address 202.43.65.2
  pre-shared-key local OlympLab2026
  pre-shared-key remote OlympLab2026
!
crypto ikev2 profile PROF_HQ
 match identity remote address 202.43.65.2 255.255.255.255
 authentication remote pre-share
 authentication local pre-share
 keyring local KR_HQ
!
crypto ipsec transform-set TS_AES esp-aes esp-sha-hmac
 mode tunnel
!
crypto ipsec profile IPSEC_HQ
 set transform-set TS_AES
 set ikev2-profile PROF_HQ
!
interface Loopback1
 description Management
 ip address 10.1.8.1 255.255.255.255
!
interface Tunnel100
 description IPsec_to_HQ_GW-1
 ip address 192.168.255.2 255.255.255.252
 tunnel source GigabitEthernet0/1
 tunnel destination 202.43.65.2
 tunnel mode ipsec ipv4
 tunnel protection ipsec profile IPSEC_HQ
!
interface GigabitEthernet0/0
 description to_branch_users
 ip address 10.1.8.254 255.255.255.0
 ip nat inside
 duplex auto
 speed auto
 media-type rj45
!
interface GigabitEthernet0/1
 description to_ISP
 ip address dhcp
 ip nat outside
 duplex auto
 speed auto
 media-type rj45
!
interface GigabitEthernet0/2
 no ip address
 shutdown
 duplex auto
 speed auto
 media-type rj45
!
interface GigabitEthernet0/3
 no ip address
 shutdown
 duplex auto
 speed auto
 media-type rj45
!
ip dhcp excluded-address 10.1.8.1 10.1.8.10
ip dhcp excluded-address 10.1.8.250 10.1.8.254
!
ip dhcp pool BRANCH_POOL
 network 10.1.8.0 255.255.255.0
 default-router 10.1.8.254
 dns-server 8.8.8.8
!
ip forward-protocol nd
!
no ip http server
no ip http secure-server
!
ip nat inside source list NAT_OUT interface GigabitEthernet0/1 overload
!
ip route 10.1.1.0 255.255.255.0 Tunnel100
ip route 10.1.2.0 255.255.255.0 Tunnel100
!
ip access-list extended NAT_OUT
 deny   ip 10.1.8.0 0.0.0.255 10.1.1.0 0.0.0.255
 deny   ip 10.1.8.0 0.0.0.255 10.1.2.0 0.0.0.255
 permit ip 10.1.8.0 0.0.0.255 any
!
ip ssh time-out 60
ip ssh version 2
!
! --- EEM applet: эхний boot дээр RSA key auto-generate (SSH-ийн тулд) ---
event manager applet GEN_RSA_ONBOOT
 event timer countdown time 45
 action 1.0 cli command "enable"
 action 2.0 cli command "configure terminal"
 action 3.0 cli command "crypto key generate rsa modulus 2048"
 action 4.0 cli command "end"
 action 5.0 cli command "write memory"
 action 6.0 syslog msg "Br1GW: RSA keypair generated, SSH ready"
!
control-plane
!
banner login ^C
**************************************************************************
* Br1GW — Branch Gateway — Olympiad 2026                                 *
* Authorized access only.                                                *
**************************************************************************^C
!
line con 0
 exec-timeout 0 0
 logging synchronous
line aux 0
line vty 0 4
 login local
 transport input telnet ssh
!
no scheduler allocate
!
end
